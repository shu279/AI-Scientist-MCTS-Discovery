# path to the task data directory
data_dir: "data"
preprocess_data: False

goal: null
eval: null

log_dir: logs
workspace_dir: workspaces

copy_data: True
exp_name: run

exec:
  timeout: 3600
  agent_file_name: runfile.py
  format_tb_ipython: False

generate_report: True

report:
  model: gpt-5.4
  temp: 0.5

experiment:
  num_syn_datasets: 1

debug:
  stage4: False

agent:
  type: parallel
  num_workers: 4
  stages:
    stage1_max_iters: 6
    stage2_max_iters: 10
    stage3_max_iters: 10
    stage4_max_iters: 8
  steps: 5

  k_fold_validation: 1

  multi_seed_eval:
    num_seeds: 3

  expose_prediction: False
  data_preview: False

  code:
    model: gpt-5.4
    temp: 0.4
    max_tokens: 12000

  feedback:
    model: gpt-5.4
    temp: 0.3
    max_tokens: 8192

  vlm_feedback:
    model: gpt-5.4
    temp: 0.3
    max_tokens: null

  search:
    max_debug_depth: 3
    debug_prob: 0.3
    num_drafts: 3

  summary:
    model: gpt-5.4
    temp: 0.2

  select_node:
    model: gpt-5.4
    temp: 0.2